<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medici — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<style>

/* ============================================
   LOGIN — LAYOUT
   ============================================ */
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;
  font-family: var(--sans);
  color: var(--taupe-5);
  background: #0e0d11;
}

.login-frame {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ============================================
   LEFT PANEL — THE HERO
   ============================================ */
.login-hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 30% 50%, rgba(116,65,143,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 70% 60%, rgba(93,53,94,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 90% 80% at 50% 50%, rgba(42,24,46,0.6) 0%, transparent 100%),
    #0e0d11;
}

/* Animated grid lines */
.login-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, rgba(163,131,180,0.04) 0px, rgba(163,131,180,0.04) 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(163,131,180,0.04) 0px, rgba(163,131,180,0.04) 1px, transparent 1px, transparent 60px);
  animation: grid-drift 20s linear infinite;
}

@keyframes grid-drift {
  0% { transform: translate(0, 0); }
  100% { transform: translate(60px, 60px); }
}

/* Noise texture */
.login-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

/* Large logo mark */
.hero-logo-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: logo-glow 4s ease-in-out infinite;
}

@keyframes logo-glow {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(116,65,143,0.4)) drop-shadow(0 0 60px rgba(116,65,143,0.15)); }
  50% { filter: drop-shadow(0 0 50px rgba(116,65,143,0.6)) drop-shadow(0 0 100px rgba(116,65,143,0.25)); }
}

/* 6-sphere inverted triangle — large version */
.hero-spheres {
  position: relative;
  width: 108px;
  height: 98px;
}

.hero-sphere {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.hero-sphere.dark {
  background: radial-gradient(circle at 35% 30%, var(--violet-3), var(--violet-4));
  box-shadow:
    inset 0 -3px 6px rgba(0,0,0,0.3),
    inset 0 1px 3px rgba(255,255,255,0.12),
    0 0 15px rgba(116,65,143,0.35);
}

.hero-sphere.light {
  background: radial-gradient(circle at 35% 30%, var(--berry-1), var(--berry-2));
  box-shadow:
    inset 0 -3px 6px rgba(0,0,0,0.08),
    inset 0 1px 3px rgba(255,255,255,0.25),
    0 0 20px rgba(224,208,225,0.4);
}

/* Row 1 — top: 3 spheres */
.hero-sphere:nth-child(1) { top: 0; left: 0; }
.hero-sphere:nth-child(2) { top: 0; left: 39.6px; }
.hero-sphere:nth-child(3) { top: 0; left: 79.2px; }
/* Row 2 — middle: 2 spheres centered between row 1 */
.hero-sphere:nth-child(4) { top: 34.8px; left: 19.8px; }
.hero-sphere:nth-child(5) { top: 34.8px; left: 59.4px; }
/* Row 3 — bottom: 1 sphere centered */
.hero-sphere:nth-child(6) { top: 69.6px; left: 39.6px; }

.hero-wordmark {
  font-family: var(--pixel);
  font-size: 52px;
  color: #e0dee5;
  letter-spacing: 6px;
  text-shadow: 0 0 40px rgba(116,65,143,0.5), 0 2px 0 rgba(0,0,0,0.6);
  line-height: 1;
}

.hero-tagline {
  font-family: var(--mono);
  font-size: 13px;
  color: rgba(163,131,180,0.7);
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

/* Floating particles */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--violet-2);
  opacity: 0;
  animation: float-up linear infinite;
}

@keyframes float-up {
  0% { opacity: 0; transform: translateY(0) scale(1); }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-300px) scale(0.5); }
}

/* Scanlines */
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 3;
}

/* Bottom attribution */
.hero-footer {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
}

.hero-footer-text {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(163,131,180,0.35);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ============================================
   RIGHT PANEL — AUTH
   ============================================ */
.login-auth {
  width: 460px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  background: var(--white);
  border-left: 2px solid;
  border-color: var(--taupe-2);
  position: relative;
}

.auth-card {
  width: 100%;
  max-width: 340px;
}

.auth-header {
  margin-bottom: 32px;
}

.auth-title {
  font-family: var(--pixel);
  font-size: 24px;
  color: var(--taupe-5);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.auth-subtitle {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--taupe-3);
  line-height: 1.5;
}

/* SSO Buttons */
.sso-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}

.sso-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 11px 16px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--taupe-5);
  background: var(--off-white);
  border: 2px solid;
  border-color: var(--taupe-1) var(--taupe-3) var(--taupe-3) var(--taupe-1);
  border-radius: var(--r-md);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}

.sso-btn:hover {
  background: var(--berry-1);
  border-color: var(--berry-2) var(--berry-4) var(--berry-4) var(--berry-2);
  color: var(--berry-5);
}

.sso-btn:active {
  border-color: var(--berry-4) var(--berry-2) var(--berry-2) var(--berry-4);
}

.sso-btn:focus-visible { outline: 2px solid var(--violet-3); outline-offset: 2px; }

.sso-icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sso-icon svg {
  width: 18px;
  height: 18px;
  display: block;
}

/* Divider */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.auth-divider-line {
  flex: 1;
  height: 1px;
  background: var(--taupe-2);
}

.auth-divider-text {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--taupe-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Email form */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.auth-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.auth-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--taupe-4);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.auth-input {
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--taupe-5);
  background: var(--off-white);
  border: 1px solid;
  border-color: var(--taupe-3) var(--taupe-1) var(--taupe-1) var(--taupe-3);
  border-radius: var(--r-md);
  outline: none;
  transition: border-color 0.15s;
}

.auth-input:focus {
  border-color: var(--violet-3);
  box-shadow: 0 0 0 1px var(--violet-3);
  border-radius: var(--r-md);
}

.auth-input::placeholder {
  color: var(--taupe-2);
}

.auth-submit {
  padding: 12px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: #f0eef4;
  background: var(--violet-3);
  border: 2px solid;
  border-color: var(--violet-2) var(--violet-5) var(--violet-5) var(--violet-2);
  border-radius: var(--r-md);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
  transition: all 0.15s;
}

.auth-submit:hover {
  background: var(--violet-4);
}

.auth-submit:active {
  border-color: var(--violet-5) var(--violet-2) var(--violet-2) var(--violet-5);
}

.auth-submit:focus-visible { outline: 2px solid var(--violet-3); outline-offset: 2px; }
.auth-submit:disabled { opacity: 0.5; cursor: default; }

/* Footer links */
.auth-footer {
  margin-top: 28px;
  text-align: center;
}

.auth-footer-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--taupe-3);
  line-height: 1.6;
}

.auth-footer-link {
  color: var(--violet-3);
  text-decoration: none;
  font-weight: 600;
}

.auth-footer-link:hover {
  color: var(--berry-3);
}

/* Secured by Clerk badge */
.auth-badge {
  position: absolute;
  bottom: 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--taupe-2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.auth-badge-lock {
  width: 12px;
  height: 12px;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 900px) {
  .login-frame {
    flex-direction: column;
  }
  .login-hero {
    flex: 0 0 220px;
  }
  .hero-wordmark {
    font-size: 36px;
    letter-spacing: 4px;
  }
  .hero-spheres {
    width: 72px;
    height: 66px;
  }
  .hero-sphere {
    width: 24px;
    height: 24px;
  }
  .hero-sphere:nth-child(1) { top: 0; left: 0; }
  .hero-sphere:nth-child(2) { top: 0; left: 26.4px; }
  .hero-sphere:nth-child(3) { top: 0; left: 52.8px; }
  .hero-sphere:nth-child(4) { top: 23.4px; left: 13.2px; }
  .hero-sphere:nth-child(5) { top: 23.4px; left: 39.6px; }
  .hero-sphere:nth-child(6) { top: 46.8px; left: 26.4px; }
  .hero-content {
    gap: 16px;
  }
  .login-auth {
    width: 100%;
    border-left: none;
    border-top: 2px solid var(--taupe-2);
  }
}

</style>
</head>
<body>

<div class="login-frame">

  <!-- LEFT — Hero / Brand -->
  <div class="login-hero">
    <div class="scanlines"></div>

    <!-- Floating particles — generated by JS -->
    <div id="particles"></div>

    <div class="hero-content">
      <div class="hero-logo-mark">
        <div class="hero-spheres">
          <div class="hero-sphere dark"></div>
          <div class="hero-sphere light"></div>
          <div class="hero-sphere dark"></div>
          <div class="hero-sphere dark"></div>
          <div class="hero-sphere dark"></div>
          <div class="hero-sphere dark"></div>
        </div>
      </div>
      <div class="hero-wordmark">MEDICI</div>
      <div class="hero-tagline">Applied Intelligence for Institutional Finance</div>
    </div>

    <div class="hero-footer">
      <div class="hero-footer-text">Medici Intelligence Systems &middot; v2.1</div>
    </div>
  </div>

  <!-- RIGHT — Auth Panel -->
  <div class="login-auth">

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Sign in</div>
        <div class="auth-subtitle">Access your workspace to continue.</div>
      </div>

      <!-- SSO Providers -->
      <div class="sso-buttons">
        <button class="sso-btn">
          <span class="sso-icon">
            <svg viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
          </span>
          Continue with Google
        </button>
        <button class="sso-btn">
          <span class="sso-icon">
            <svg viewBox="0 0 21 21" fill="none">
              <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
              <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
              <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
              <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
            </svg>
          </span>
          Continue with Microsoft
        </button>
        <button class="sso-btn">
          <span class="sso-icon">
            <svg viewBox="0 0 18 18" fill="none">
              <path d="M15.31 11.34l-1.37-1.37a.47.47 0 0 0-.67 0L9 14.24l-4.27-4.27a.47.47 0 0 0-.67 0l-1.37 1.37a.47.47 0 0 0 0 .67l5.97 5.97a.47.47 0 0 0 .67 0l5.97-5.97a.47.47 0 0 0 .01-.67zm0-6.32L13.94 3.65a.47.47 0 0 0-.67 0L9 7.92 4.73 3.65a.47.47 0 0 0-.67 0L2.69 5.02a.47.47 0 0 0 0 .67l5.97 5.97a.47.47 0 0 0 .67 0l5.97-5.97a.47.47 0 0 0 .01-.67z" fill="#2684FF"/>
            </svg>
          </span>
          Continue with Atlassian
        </button>
      </div>

      <div class="auth-footer">
        <div class="auth-footer-text">
          Don't have an account? <a href="#" class="auth-footer-link">Request access</a><br>
          <a href="#" class="auth-footer-link">Terms of Service</a> &middot; <a href="#" class="auth-footer-link">Privacy Policy</a>
        </div>
      </div>
    </div>

    <div class="auth-badge">
      <svg class="auth-badge-lock" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="7" width="10" height="7"/>
        <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
      </svg>
      Secured by Clerk
    </div>

  </div>

</div>

<script>
// Generate floating particles
(function() {
  const container = document.getElementById('particles');
  const count = 30;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
})();

// SSO button listeners (replaces inline onclick)
document.querySelectorAll('.sso-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { window.location.href = 'index.html'; });
});
</script>

</body>
</html>
